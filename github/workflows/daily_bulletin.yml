name: ParkSyde Daily Bulletin ‚Äî The Bright Side

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  generate-bulletin:
    name: Generate Daily Bulletin
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Set bulletin date
        id: date
        run: |
          echo "date=$(TZ='Australia/Brisbane' date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "time=$(TZ='Australia/Brisbane' date '+%H:%M AEST')" >> $GITHUB_OUTPUT

      - name: Generate bulletin scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PARKSYDE_WEBHOOK: ${{ secrets.PARKSYDE_WEBHOOK }}
          PARKSYDE_WEBHOOK_SECRET: ${{ secrets.PARKSYDE_WEBHOOK_SECRET }}
