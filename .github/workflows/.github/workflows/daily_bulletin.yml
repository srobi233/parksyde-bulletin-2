name: ParkSyde Daily Bulletin ‚Äî The Bright Side

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  generate-bulletin:
    name: Generate Daily Bulletin
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
