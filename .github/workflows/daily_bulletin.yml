name: Daily Bulletin

on:
  schedule:
    - cron: '0 20 * * *'  # 6am AEST (20:00 UTC previous day)
  workflow_dispatch:       # allows manual trigger from Actions tab

permissions:
  contents: write

jobs:
  generate-bulletin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic requests

      - name: Generate bulletin
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PARKSYDE_WEBHOOK_SECRET: ${{ secrets.PARKSYDE_WEBHOOK_SECRET }}
        run: |
          python generate_bulletin.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A output/
          git diff --staged --quiet || git commit -m "Daily bulletin $(date +%Y-%m-%d)"
          git push
